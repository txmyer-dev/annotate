<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Annotate — URL to Tutorial Images</title>
  <style>
    :root {
      --bg: #0a0a0a;
      --surface: #141414;
      --border: #2a2a2a;
      --text: #e5e5e5;
      --muted: #888;
      --accent: #3b82f6;
      --accent-hover: #2563eb;
      --success: #22c55e;
      --error: #ef4444;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      text-align: center;
      margin-bottom: 3rem;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: 700;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      color: var(--muted);
      font-size: 1.1rem;
    }

    .input-group {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 2rem;
    }

    .url-row {
      display: flex;
      gap: 0.75rem;
      align-items: stretch;
      margin-bottom: 1.25rem;
    }

    input[type="text"] {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.875rem 1rem;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: #555; }

    button.generate {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 10px;
      padding: 0.875rem 1.75rem;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    button.generate:hover { background: var(--accent-hover); }
    button.generate:active { transform: scale(0.98); }
    button.generate:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .platforms-label {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.6rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .platform-grid { display: flex; flex-wrap: wrap; gap: 0.5rem; }

    .platform-chip { position: relative; }
    .platform-chip input { position: absolute; opacity: 0; width: 0; height: 0; }

    .platform-chip label {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.85rem;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      user-select: none;
    }

    .platform-chip label .dims { font-size: 0.7rem; opacity: 0.5; }

    .platform-chip input:checked + label {
      background: rgba(59, 130, 246, 0.12);
      border-color: var(--accent);
      color: var(--text);
    }

    .platform-chip label:hover { border-color: #444; }

    .prompt-row {
      margin-top: 1rem;
    }

    .prompt-row textarea {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.75rem 1rem;
      color: var(--text);
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      resize: vertical;
      min-height: 2.5rem;
      max-height: 8rem;
      transition: border-color 0.2s;
    }

    .prompt-row textarea:focus { border-color: var(--accent); }
    .prompt-row textarea::placeholder { color: #555; }

    .status {
      margin-top: 1rem;
      display: none;
      align-items: center;
      gap: 0.75rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .status.visible { display: flex; }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .spinner-sm { width: 14px; height: 14px; }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      display: none;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 1rem;
      color: var(--error);
      margin-top: 1rem;
      font-size: 0.9rem;
    }

    .error-msg.visible { display: block; }

    .results { display: none; margin-top: 1rem; }
    .results.visible { display: block; }

    .results-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }

    .results-meta { color: var(--muted); font-size: 0.85rem; }
    .results-meta strong { color: var(--text); }

    .cost-badge {
      display: inline-block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.2);
      color: var(--success);
      font-size: 0.75rem;
      padding: 0.25rem 0.6rem;
      border-radius: 6px;
      margin-left: 0.5rem;
    }

    button.download-all {
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.6rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button.download-all:hover { opacity: 0.85; }

    .image-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
    }

    .image-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.6rem 0.8rem;
      border-bottom: 1px solid var(--border);
    }

    .platform-name { font-size: 0.8rem; font-weight: 600; color: var(--text); }
    .ratio-label { font-size: 0.7rem; color: var(--muted); margin-left: 0.4rem; }

    .card-download {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .card-download:hover { background: rgba(59, 130, 246, 0.1); }

    .card-body img { width: 100%; height: auto; display: block; cursor: pointer; }

    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(8px);
      align-items: center;
      justify-content: center;
      padding: 2rem;
      cursor: pointer;
    }

    .lightbox.visible { display: flex; }

    .lightbox-inner {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
      cursor: default;
    }

    .lightbox-inner img {
      max-width: 90vw;
      max-height: 85vh;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      display: block;
    }

    .lightbox-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 0;
    }

    .lightbox-label {
      color: var(--text);
      font-size: 0.9rem;
      font-weight: 600;
    }

    .lightbox-label span {
      color: var(--muted);
      font-weight: 400;
      font-size: 0.8rem;
      margin-left: 0.5rem;
    }

    .lightbox-download {
      background: var(--success);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 0.5rem 1.25rem;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    .lightbox-download:hover { opacity: 0.85; }

    .lightbox-close {
      position: absolute;
      top: -2.5rem;
      right: 0;
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.5rem;
      cursor: pointer;
      padding: 0.25rem 0.5rem;
      line-height: 1;
    }

    .lightbox-close:hover { color: var(--text); }

    .card-loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.85rem;
      gap: 0.5rem;
    }

    .card-error {
      padding: 1.5rem;
      color: var(--error);
      font-size: 0.8rem;
      text-align: center;
    }

    footer {
      text-align: center;
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 0.8rem;
    }

    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      .url-row { flex-direction: column; }
      h1 { font-size: 1.75rem; }
      .image-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1><span>Annotate</span></h1>
      <p class="subtitle">Paste a URL. Get annotated tutorial images. No Canva needed.</p>
    </header>

    <div class="input-group">
      <div class="url-row">
        <input type="text" id="url-input" placeholder="example.com" autofocus />
        <button class="generate" id="generate-btn" onclick="generate()">Generate</button>
      </div>
      <div class="platforms-label">Platforms</div>
      <div class="platform-grid" id="platform-grid"></div>
      <div class="prompt-row">
        <textarea id="prompt-input" rows="1" placeholder="Optional: &quot;Focus on the pricing section&quot; or &quot;Highlight the signup flow&quot;"></textarea>
      </div>
      <div class="status" id="status">
        <div class="spinner"></div>
        <span id="status-text">Capturing screenshot...</span>
      </div>
    </div>

    <div class="error-msg" id="error"></div>

    <div class="results" id="results">
      <div class="results-header">
        <div class="results-meta">
          <strong id="results-title"></strong>
          <br/>
          <span id="results-info"></span>
          <span class="cost-badge" id="cost-badge"></span>
        </div>
        <button class="download-all" onclick="downloadAll()">Download All</button>
      </div>
      <div class="image-grid" id="image-grid"></div>
    </div>

    <div class="lightbox" id="lightbox">
      <div class="lightbox-inner">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <img id="lightbox-img" alt="Preview" />
        <div class="lightbox-bar">
          <div class="lightbox-label" id="lightbox-label"></div>
          <button class="lightbox-download" id="lightbox-download">Download PNG</button>
        </div>
      </div>
    </div>

    <footer>
      Built with <a href="https://n8n.io">n8n</a>, <a href="https://anthropic.com">Claude Vision</a>, and <a href="https://www.hostinger.com">Hostinger</a>
      &mdash; <a href="https://github.com/txmyer-dev/annotate">Source</a>
      <br/><br/>
      Scrapes.ai x Hostinger Hackathon 2026
    </footer>
  </div>

  <script>
    const PLATFORMS = [
      { id: 'ig-feed',    name: 'Instagram Feed',    ratio: '4:5',    w: 1080, h: 1350 },
      { id: 'ig-stories', name: 'Instagram Stories',  ratio: '9:16',   w: 1080, h: 1920 },
      { id: 'facebook',   name: 'Facebook',           ratio: '1:1',    w: 1080, h: 1080 },
      { id: 'linkedin',   name: 'LinkedIn',           ratio: '1.91:1', w: 1200, h: 628  },
      { id: 'x-twitter',  name: 'X / Twitter',        ratio: '16:9',   w: 1600, h: 900  },
      { id: 'tiktok',     name: 'TikTok',             ratio: '9:16',   w: 1080, h: 1920 },
      { id: 'snapchat',   name: 'Snapchat',           ratio: '9:16',   w: 1080, h: 1920 },
      { id: 'pinterest',  name: 'Pinterest',          ratio: '2:3',    w: 1000, h: 1500 },
    ];

    const DEFAULT_SELECTED = ['ig-feed', 'facebook', 'linkedin'];

    // Build platform chips using safe DOM methods
    const platformGrid = document.getElementById('platform-grid');
    PLATFORMS.forEach(function(p) {
      var chip = document.createElement('div');
      chip.className = 'platform-chip';

      var input = document.createElement('input');
      input.type = 'checkbox';
      input.id = 'plat-' + p.id;
      input.value = p.id;
      if (DEFAULT_SELECTED.indexOf(p.id) !== -1) input.checked = true;

      var label = document.createElement('label');
      label.setAttribute('for', 'plat-' + p.id);
      label.textContent = p.name + ' ';

      var dims = document.createElement('span');
      dims.className = 'dims';
      dims.textContent = p.ratio;
      label.appendChild(dims);

      chip.appendChild(input);
      chip.appendChild(label);
      platformGrid.appendChild(chip);
    });

    var urlInput = document.getElementById('url-input');
    var promptInput = document.getElementById('prompt-input');
    var generateBtn = document.getElementById('generate-btn');
    var statusEl = document.getElementById('status');
    var statusText = document.getElementById('status-text');
    var errorEl = document.getElementById('error');
    var resultsEl = document.getElementById('results');
    var imageGrid = document.getElementById('image-grid');
    var resultsTitle = document.getElementById('results-title');
    var resultsInfo = document.getElementById('results-info');
    var costBadge = document.getElementById('cost-badge');

    var generatedImages = [];

    var statusMessages = [
      'Capturing screenshot...',
      'Extracting page metadata...',
      'Claude is analyzing the page...',
      'Generating annotation plan...',
      'Rendering all formats...',
      'Almost there...',
    ];

    urlInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') generate();
    });

    function getSelectedPlatforms() {
      return PLATFORMS.filter(function(p) {
        return document.getElementById('plat-' + p.id).checked;
      });
    }

    function buildCardElement(p, state) {
      var card = document.createElement('div');
      card.className = 'image-card';
      card.id = 'card-' + p.id;

      var header = document.createElement('div');
      header.className = 'card-header';

      var info = document.createElement('div');
      var nameSpan = document.createElement('span');
      nameSpan.className = 'platform-name';
      nameSpan.textContent = p.name;
      var ratioSpan = document.createElement('span');
      ratioSpan.className = 'ratio-label';
      ratioSpan.textContent = p.ratio + ' \u00B7 ' + p.w + 'x' + p.h;
      info.appendChild(nameSpan);
      info.appendChild(ratioSpan);

      var dlBtn = document.createElement('button');
      dlBtn.className = 'card-download';
      dlBtn.textContent = 'Download';
      dlBtn.style.display = state === 'loaded' ? '' : 'none';
      dlBtn.addEventListener('click', function() { downloadOne(p.id); });

      header.appendChild(info);
      header.appendChild(dlBtn);
      card.appendChild(header);

      var body = document.createElement('div');
      body.className = 'card-body';

      if (state === 'loading') {
        var loading = document.createElement('div');
        loading.className = 'card-loading';
        var spinner = document.createElement('div');
        spinner.className = 'spinner spinner-sm';
        loading.appendChild(spinner);
        loading.appendChild(document.createTextNode(' Generating...'));
        body.appendChild(loading);
      }

      card.appendChild(body);
      return card;
    }

    function setCardLoaded(platformId, imageSrc) {
      var card = document.getElementById('card-' + platformId);
      if (!card) return;
      var body = card.querySelector('.card-body');
      body.textContent = '';
      var img = document.createElement('img');
      img.src = imageSrc;
      img.alt = platformId + ' annotated image';
      img.addEventListener('click', function() { openLightbox(platformId); });
      body.appendChild(img);
      var dlBtn = card.querySelector('.card-download');
      if (dlBtn) dlBtn.style.display = '';
    }

    function setCardError(platformId, message) {
      var card = document.getElementById('card-' + platformId);
      if (!card) return;
      var body = card.querySelector('.card-body');
      body.textContent = '';
      var errDiv = document.createElement('div');
      errDiv.className = 'card-error';
      errDiv.textContent = message;
      body.appendChild(errDiv);
    }

    async function generate() {
      var url = urlInput.value.trim();
      if (!url) { urlInput.focus(); return; }
      // Normalize URL: add https:// if no protocol
      if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url.replace(/^\/\//, '');
      }
      urlInput.value = url;

      var selected = getSelectedPlatforms();
      if (selected.length === 0) {
        errorEl.textContent = 'Select at least one platform.';
        errorEl.classList.add('visible');
        return;
      }

      // Reset UI
      errorEl.classList.remove('visible');
      resultsEl.classList.remove('visible');
      statusEl.classList.add('visible');
      generateBtn.disabled = true;
      imageGrid.textContent = '';
      generatedImages = [];

      // Cycle status messages
      var msgIndex = 0;
      statusText.textContent = statusMessages[0];
      var statusInterval = setInterval(function() {
        msgIndex = Math.min(msgIndex + 1, statusMessages.length - 1);
        statusText.textContent = statusMessages[msgIndex];
      }, 5000);

      // Create placeholder cards
      selected.forEach(function(p) {
        imageGrid.appendChild(buildCardElement(p, 'loading'));
      });

      resultsEl.classList.add('visible');
      resultsTitle.textContent = 'Generating...';
      resultsInfo.textContent = url + ' \u2014 ' + selected.length + ' format' + (selected.length > 1 ? 's' : '');
      costBadge.textContent = '~$0.03 est.';

      var startTime = Date.now();
      var userPrompt = promptInput.value.trim();

      // Deduplicate ratios but track which platforms map to which ratio
      var ratioMap = {};
      selected.forEach(function(p) {
        if (!ratioMap[p.ratio]) ratioMap[p.ratio] = [];
        ratioMap[p.ratio].push(p);
      });
      var uniqueFormats = Object.keys(ratioMap);

      try {
        // ONE request with all formats
        var res = await fetch('/api/annotate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url: url, formats: uniqueFormats, prompt: userPrompt }),
        });

        clearInterval(statusInterval);

        if (!res.ok) {
          var errData = await res.json();
          throw new Error(errData.error || 'Request failed');
        }

        var data = await res.json();

        if (data.images) {
          // Map images back to platforms (multiple platforms can share a ratio)
          selected.forEach(function(p) {
            var img = data.images[p.ratio];
            if (img) {
              generatedImages.push({ id: p.id, name: p.name, ratio: p.ratio, image: img });
              setCardLoaded(p.id, img);
            } else {
              setCardError(p.id, 'No image for this format');
            }
          });
        } else {
          throw new Error('No images returned');
        }

        var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
        resultsTitle.textContent = generatedImages.length + '/' + selected.length + ' images generated';
        resultsInfo.textContent = url + ' \u2014 ' + elapsed + 's \u2014 ' + uniqueFormats.length + ' unique ratio' + (uniqueFormats.length > 1 ? 's' : '') + ' rendered';
        costBadge.textContent = '~$0.03';
      } catch (err) {
        clearInterval(statusInterval);
        selected.forEach(function(p) { setCardError(p.id, err.message); });
        errorEl.textContent = err.message;
        errorEl.classList.add('visible');
      } finally {
        statusEl.classList.remove('visible');
        generateBtn.disabled = false;
      }
    }

    function downloadOne(platformId) {
      var img = generatedImages.find(function(i) { return i.id === platformId; });
      if (!img) return;
      var a = document.createElement('a');
      a.href = img.image;
      var domain = urlInput.value.replace(/https?:\/\//, '').replace(/[/\\?#]/g, '_').slice(0, 30);
      a.download = 'annotated_' + domain + '_' + platformId + '.png';
      a.click();
    }

    // Lightbox
    var lightbox = document.getElementById('lightbox');
    var lightboxImg = document.getElementById('lightbox-img');
    var lightboxLabel = document.getElementById('lightbox-label');
    var lightboxDownload = document.getElementById('lightbox-download');
    var lightboxClose = document.getElementById('lightbox-close');
    var lightboxPlatformId = null;

    function openLightbox(platformId) {
      var img = generatedImages.find(function(i) { return i.id === platformId; });
      if (!img) return;
      lightboxPlatformId = platformId;
      lightboxImg.src = img.image;

      var plat = PLATFORMS.find(function(p) { return p.id === platformId; });
      lightboxLabel.textContent = '';
      lightboxLabel.appendChild(document.createTextNode(img.name));
      if (plat) {
        var sp = document.createElement('span');
        sp.textContent = plat.ratio + ' \u00B7 ' + plat.w + 'x' + plat.h;
        lightboxLabel.appendChild(sp);
      }

      lightbox.classList.add('visible');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('visible');
      document.body.style.overflow = '';
      lightboxPlatformId = null;
    }

    lightbox.addEventListener('click', function(e) {
      if (e.target === lightbox) closeLightbox();
    });

    lightboxClose.addEventListener('click', closeLightbox);

    lightboxDownload.addEventListener('click', function() {
      if (lightboxPlatformId) downloadOne(lightboxPlatformId);
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'Escape' && lightbox.classList.contains('visible')) closeLightbox();
    });

    function downloadAll() {
      generatedImages.forEach(function(img) {
        var a = document.createElement('a');
        a.href = img.image;
        var domain = urlInput.value.replace(/https?:\/\//, '').replace(/[/\\?#]/g, '_').slice(0, 30);
        a.download = 'annotated_' + domain + '_' + img.id + '.png';
        a.click();
      });
    }
  </script>
</body>
</html>
