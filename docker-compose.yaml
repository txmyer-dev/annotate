version: '3.8'
services:
  annotate:
    build: .
    ports:
      - "3100:3100"
    environment:
      - N8N_BASE=https://n8n.felaniam.cloud/webhook
      - PORT=3100
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.annotate.rule=Host(`annotate.felaniam.cloud`)"
      - "traefik.http.routers.annotate.entrypoints=https"
      - "traefik.http.routers.annotate.tls=true"
      - "traefik.http.routers.annotate.tls.certresolver=letsencrypt"
      - "traefik.http.services.annotate.loadbalancer.server.port=3100"
    networks:
      - coolify

networks:
  coolify:
    external: true
